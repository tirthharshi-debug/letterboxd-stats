<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="470" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="120" y1="120" x2="390" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <filter id="blurGlow">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Soft cinematic glow -->
  <circle cx="390" cy="110" r="70" fill="#F97316" opacity="0.15" filter="url(#blurGlow)"/>
  <circle cx="120" cy="390" r="90" fill="#22C55E" opacity="0.12" filter="url(#blurGlow)"/>

  <!-- Main abstract symbol -->
  <path d="M140 330C140 250 195 185 270 185C325 185 370 220 392 274"
        stroke="url(#accent)"
        stroke-width="28"
        stroke-linecap="round"/>

  <path d="M370 180V310"
        stroke="#F8FAFC"
        stroke-width="24"
        stroke-linecap="round"
        opacity="0.9"/>

  <!-- Floating stat bars -->
  <rect x="150" y="300" width="24" height="52" rx="12" fill="#22C55E" opacity="0.9"/>
  <rect x="195" y="265" width="24" height="87" rx="12" fill="#F97316" opacity="0.9"/>
  <rect x="240" y="225" width="24" height="127" rx="12" fill="#38BDF8" opacity="0.9"/>

  <!-- Tiny stars -->
  <circle cx="165" cy="145" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="325" cy="120" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="355" cy="370" r="5" fill="#FFFFFF" opacity="0.5"/>

  <!-- subtle grain lines -->
  <path d="M120 410H390" stroke="#FFFFFF" opacity="0.06" stroke-width="3"/>
  <path d="M140 430H360" stroke="#FFFFFF" opacity="0.05" stroke-width="2"/>
</svg>